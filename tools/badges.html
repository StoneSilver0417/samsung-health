<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; background: #2a2f3a; font-family: sans-serif; }
  .badge { width: 512px; height: 512px; display: inline-block; }
  #app_icon { width: 1024px; height: 1024px; display: block; }
</style>
</head>
<body>
<div id="container"></div>
<script>
const ICONS = {
  chevrons: (c) => `
    <g stroke="${c}" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="225,118 250,143 225,168"/>
      <polyline points="262,118 287,143 262,168"/>
    </g>`,
  star: (c) => `
    <path fill="${c}" d="M256 108 L271 146 L312 149 L281 175 L291 215 L256 193 L221 215 L231 175 L200 149 L241 146 Z"/>`,
  watch: (c) => `
    <g stroke="${c}" stroke-width="13" fill="none" stroke-linecap="round">
      <circle cx="256" cy="148" r="34"/>
      <line x1="256" y1="148" x2="256" y2="128"/>
      <line x1="256" y1="148" x2="271" y2="155"/>
      <line x1="243" y1="100" x2="269" y2="100"/>
    </g>`,
  flame: (c) => `
    <path fill="${c}" d="M256 100 C 268 122 290 134 290 162 C 290 184 275 200 256 200
      C 237 200 222 184 222 162 C 222 150 227 141 234 131 C 236 144 243 150 247 147
      C 251 144 247 122 256 100 Z"/>`,
  moon: (c) => `
    <path fill="${c}" d="M276 104 A 48 48 0 1 0 276 196 A 38 38 0 1 1 276 104 Z"/>`,
};

const BADGES = [
  { id: 'first_run',   hue: '#C8FF3D', dark: '#6d8f1f', icon: 'chevrons', glyph: '1ST', sub: 'FIRST RUN' },
  { id: 'first_5k',    hue: '#C8FF3D', dark: '#6d8f1f', icon: 'chevrons', glyph: '5K',  sub: 'SINGLE RUN' },
  { id: 'first_10k',   hue: '#C8FF3D', dark: '#6d8f1f', icon: 'chevrons', glyph: '10K', sub: 'SINGLE RUN' },
  { id: 'total_50k',   hue: '#FFC93D', dark: '#9a7414', icon: 'star',     glyph: '50',  sub: 'TOTAL KM' },
  { id: 'total_100k',  hue: '#FFC93D', dark: '#9a7414', icon: 'star',     glyph: '100', sub: 'TOTAL KM' },
  { id: 'total_250k',  hue: '#FFC93D', dark: '#9a7414', icon: 'star',     glyph: '250', sub: 'TOTAL KM' },
  { id: 'total_500k',  hue: '#FFC93D', dark: '#9a7414', icon: 'star',     glyph: '500', sub: 'TOTAL KM' },
  { id: 'run_10min',   hue: '#3DD9FF', dark: '#15768f', icon: 'watch',    glyph: '10',  sub: 'MINUTES' },
  { id: 'run_20min',   hue: '#3DD9FF', dark: '#15768f', icon: 'watch',    glyph: '20',  sub: 'MINUTES' },
  { id: 'run_30min',   hue: '#3DD9FF', dark: '#15768f', icon: 'watch',    glyph: '30',  sub: 'MINUTES' },
  { id: 'run_60min',   hue: '#3DD9FF', dark: '#15768f', icon: 'watch',    glyph: '60',  sub: 'MINUTES' },
  { id: 'week_3runs',  hue: '#FF7A3D', dark: '#993f14', icon: 'flame',    glyph: '3×',  sub: 'ONE WEEK' },
  { id: 'streak_2w',   hue: '#FF7A3D', dark: '#993f14', icon: 'flame',    glyph: '2W',  sub: 'STREAK' },
  { id: 'streak_4w',   hue: '#FF7A3D', dark: '#993f14', icon: 'flame',    glyph: '4W',  sub: 'STREAK' },
  { id: 'month_10runs',hue: '#FF7A3D', dark: '#993f14', icon: 'flame',    glyph: '10×', sub: 'ONE MONTH' },
  { id: 'night_owl',   hue: '#B07AFF', dark: '#5c33a8', icon: 'moon',     glyph: '10×', sub: 'NIGHT RUNS' },
];

function badgeSvg(b) {
  const fontSize = b.glyph.length >= 3 ? 132 : 158;
  return `
  <div class="badge" id="${b.id}">
  <svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="ring_${b.id}" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="${b.hue}"/>
        <stop offset="100%" stop-color="${b.dark}"/>
      </linearGradient>
      <radialGradient id="glow_${b.id}" cx="0.5" cy="0.42" r="0.7">
        <stop offset="0%" stop-color="${b.hue}" stop-opacity="0.22"/>
        <stop offset="65%" stop-color="${b.hue}" stop-opacity="0.05"/>
        <stop offset="100%" stop-color="${b.hue}" stop-opacity="0"/>
      </radialGradient>
      <filter id="soft_${b.id}" x="-30%" y="-30%" width="160%" height="160%">
        <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="${b.hue}" flood-opacity="0.55"/>
      </filter>
    </defs>

    <!-- 바탕 코인 -->
    <circle cx="256" cy="256" r="244" fill="#11151c"/>
    <circle cx="256" cy="256" r="244" fill="url(#glow_${b.id})"/>

    <!-- 그라데이션 링 -->
    <circle cx="256" cy="256" r="232" fill="none"
            stroke="url(#ring_${b.id})" stroke-width="20"/>
    <!-- 틱 장식 링 -->
    <circle cx="256" cy="256" r="206" fill="none" stroke="${b.hue}"
            stroke-opacity="0.28" stroke-width="3"
            stroke-dasharray="2 14" stroke-linecap="round"/>

    <!-- 카테고리 아이콘 -->
    <g filter="url(#soft_${b.id})">${ICONS[b.icon](b.hue)}</g>

    <!-- 메인 글리프 -->
    <text x="256" y="318" text-anchor="middle"
          font-family="'Arial Black', 'Segoe UI', sans-serif" font-weight="900"
          font-size="${fontSize}" fill="${b.hue}"
          filter="url(#soft_${b.id})">${b.glyph}</text>

    <!-- 서브 라벨 -->
    <text x="256" y="386" text-anchor="middle"
          font-family="'Segoe UI', sans-serif" font-weight="700"
          font-size="27" letter-spacing="7" fill="#9aa4b2">${b.sub}</text>

    <!-- 하단 포인트 -->
    <circle cx="226" cy="424" r="5" fill="${b.hue}" opacity="0.9"/>
    <circle cx="256" cy="424" r="5" fill="${b.hue}" opacity="0.55"/>
    <circle cx="286" cy="424" r="5" fill="${b.hue}" opacity="0.3"/>
  </svg>
  </div>`;
}

const appIcon = `
<div id="app_icon">
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ic_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161d27"/>
      <stop offset="100%" stop-color="#0a0d12"/>
    </linearGradient>
    <linearGradient id="ic_ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C8FF3D"/>
      <stop offset="100%" stop-color="#5c7a14"/>
    </linearGradient>
    <filter id="ic_glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#C8FF3D" flood-opacity="0.6"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="url(#ic_bg)"/>
  <!-- 진행 링 모티프 -->
  <circle cx="512" cy="512" r="360" fill="none" stroke="#C8FF3D" stroke-opacity="0.12" stroke-width="58"/>
  <path d="M 512 152 A 360 360 0 1 1 257 257" fill="none"
        stroke="url(#ic_ring)" stroke-width="58" stroke-linecap="round" filter="url(#ic_glow)"/>
  <!-- 스피드 셰브런 -->
  <g stroke="#C8FF3D" stroke-width="52" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#ic_glow)">
    <polyline points="380,372 524,512 380,652"/>
    <polyline points="540,372 684,512 540,652"/>
  </g>
</svg>
</div>`;

document.getElementById('container').innerHTML =
  BADGES.map(badgeSvg).join('') + appIcon;
</script>
</body>
</html>
